name: Build

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write   # для создания Releases на тегах

jobs:
  build-windows:
    name: Windows .exe + installer
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build .exe
        run: |
          pyinstaller --noconfirm --onefile --windowed --uac-admin --name OverlayMusic `
            --collect-all winrt `
            --hidden-import _platform_win `
            --exclude-module _platform_mac `
            overlay.py

      - name: Install Inno Setup
        run: |
          choco install innosetup --no-progress -y

      - name: Build installer
        shell: cmd
        run: |
          if not exist installer mkdir installer
          "%ProgramFiles(x86)%\Inno Setup 6\ISCC.exe" installer.iss

      - uses: actions/upload-artifact@v4
        with:
          name: OverlayMusic-Windows
          path: |
            dist/OverlayMusic.exe
            installer/OverlayMusic-Setup-*.exe

  build-macos:
    name: macOS .dmg (Apple Silicon)
    runs-on: macos-14   # arm64 / Apple Silicon runner
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller
          brew install media-control create-dmg

      - name: Build .app + .dmg
        run: |
          chmod +x build-mac.sh
          ./build-mac.sh

      - uses: actions/upload-artifact@v4
        with:
          name: OverlayMusic-macOS
          path: dist/OverlayMusic-arm64.dmg

  release:
    name: Publish release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build-windows, build-macos]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/OverlayMusic-Windows/dist/OverlayMusic.exe
            artifacts/OverlayMusic-Windows/installer/*.exe
            artifacts/OverlayMusic-macOS/OverlayMusic-arm64.dmg
          draft: false
          prerelease: false
          generate_release_notes: true
